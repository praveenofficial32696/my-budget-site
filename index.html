<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker Pro</title>
    <style>
        :root { 
            --primary-green: #22c55e; 
            --primary-blue: #2563eb; 
            --danger-red: #ef4444; 
            --warning-amber: #f59e0b; 
            --bg-body: #f1f5f9; 
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --balance-outline: #ff9800; /* Orange border color */
            --deep-indigo: #4c1d95; /* New Deep Purple/Indigo Variable */
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .header-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .main-title { 
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-green), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card { 
            background: var(--bg-card); 
            padding: 18px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        /* --- Updated Balance Box --- */
        .balance-box { 
            background: var(--deep-indigo); 
            padding: 22px; 
            border-radius: 24px; 
            text-align: center; 
            border: 1.5px solid var(--balance-outline);
            transition: background-color 0.3s;
        }
        
        .balance-box.over-budget { background: var(--danger-red); }

        .balance-box small { 
            color: #ffffff; /* Changed from black to White */
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 5px;
        }

        .balance-box h1 { 
            margin: 8px 0; 
            font-size: 34px; 
            font-weight: 800; 
            color: #ffffff; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .progress-container { background: rgba(255,255,255,0.2); border-radius: 10px; height: 8px; margin: 15px 0; overflow: hidden; }
        #progressBar { background: white; height: 100%; width: 0%; transition: width 0.4s ease; }
        
        .box-stats { 
            display: flex; 
            justify-content: space-around; 
            font-size: 12px; 
            font-weight: 700; 
            color: white; 
            padding-top: 10px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
        }

        /* Input Controls */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 14px; border: 1px solid var(--border-color); 
            border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; 
            background: var(--bg-body); color: var(--text-main);
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary-blue); }

        .unwanted-container { 
            display: flex; align-items: center; gap: 10px; 
            margin: 15px 0; cursor: pointer; 
        }
        .unwanted-container input { width: 20px; height: 20px; margin: 0; accent-color: var(--primary-blue); }
        .unwanted-container span { font-size: 13px; font-weight: 700; color: var(--text-muted); }

        button { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.98); }
        
        .add-btn { background: var(--primary-blue); color: white; margin-bottom: 10px; font-size: 16px;}
        .save-month-btn { background: #1e293b; color: white; font-size: 16px;}
        [data-theme="dark"] .save-month-btn { background: #334155; }

        .clear-container { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .clear-btn-text { background: none; color: var(--danger-red); font-size: 12px; font-weight: 700; width: auto; padding: 5px; }

        /* List Items */
        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            background: var(--bg-body); border: 1px solid var(--border-color); padding: 12px; 
            border-radius: 14px; margin-bottom: 8px;
        }
        .li-content { display: flex; justify-content: space-between; align-items: center; }
        li.unwanted-row { border-left: 5px solid var(--warning-amber); }

        .item-actions { display: flex; align-items: center; gap: 15px; }
        .edit-btn { color: #fb923c; font-size: 18px; cursor: pointer; }
        .delete-btn { color: var(--danger-red); font-size: 18px; cursor: pointer; }
        .frequent-tag { background: var(--primary-blue); color: white; font-size: 8px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle;}

        /* Modals */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index: 9999;
            backdrop-filter: blur(3px); padding: 20px; box-sizing: border-box;
        }
        .modal {
            background: var(--bg-card); padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal h3 { margin-top: 0; font-size: 18px; color: var(--text-main); }
        .modal p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        /* History */
        details.history-card { background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 10px; width: 100%; max-width: 450px; overflow: hidden; }
        summary { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; outline: none; }
        .hist-item { display: grid; grid-template-columns: 1fr auto; gap: 5px; padding: 10px; border-bottom: 1px dotted var(--border-color); font-size: 13px; }
    </style>
</head>
<body data-theme="light">

    <div class="header-container">
        <h1 class="main-title">💰 Budget Tracker</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
    
    <div class="card" style="padding: 10px; border: none; background: transparent; box-shadow: none;">
        <div id="balanceCard" class="balance-box">
            <small>REMAINING BALANCE</small>
            <h1 id="displayBalance">💰 ₹0</h1>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div class="box-stats">
                <span id="statIncome">Income: ₹0</span>
                <span id="statExpense">Expense: ₹0</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Monthly Salary</label>
            <input type="number" id="salaryInput" placeholder="Enter salary (e.g. 47800)" oninput="saveAndRefresh()">
        </div>

        <div class="input-group" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
            <label>Add New Expense</label>
            <input type="text" id="expName" placeholder="What was it for?" oninput="capitalizeFirst(this)">
            <input type="number" id="expAmount" placeholder="Amount (Required)" style="margin-top:10px;">
            
            <label class="unwanted-container">
                <input type="checkbox" id="unwantedCheck">
                <span>Mark as "Unwanted"</span>
            </label>

            <button class="add-btn" onclick="addExpense()">Add Expense</button>
            <button class="save-month-btn" onclick="checkDuplicateHistory()">Save Monthly History</button>
        </div>
    </div>

    <div class="card" id="listCard" style="display: none;">
        <div class="clear-container">
            <button class="clear-btn-text" onclick="showConfirmModal()">🗑️ Clear List</button>
        </div>
        <ul id="expenseList"></ul>
    </div>

    <div style="width: 100%; max-width: 450px; margin-top: 10px;">
        <p style="font-weight: 800; font-size: 14px; margin-bottom: 10px; text-align: center; color: var(--text-muted);">Saved History</p>
        <div id="historyList"></div>
    </div>

    <div id="alertModal" class="modal-overlay">
        <div class="modal">
            <h3 id="alertTitle">Notice</h3>
            <p id="alertMsg"></p>
            <button class="add-btn" onclick="closeModal('alertModal')">OK</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal">
            <h3>Are you sure?</h3>
            <p>This will permanently clear your current expense list.</p>
            <div class="modal-btns">
                <button class="add-btn" style="background: var(--danger-red);" onclick="executeClear()">Yes, Clear it</button>
                <button class="save-month-btn" onclick="closeModal('confirmModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="duplicateModal" class="modal-overlay">
        <div class="modal">
            <h3>Month Already Exists</h3>
            <p>History for this month is already saved. What would you like to do?</p>
            <div class="modal-btns">
                <button class="add-btn" onclick="handleHistoryAction('merge')">Merge (Add to existing)</button>
                <button class="add-btn" style="background: var(--warning-amber);" onclick="handleHistoryAction('overwrite')">Overwrite (Replace old)</button>
                <button class="save-month-btn" onclick="closeModal('duplicateModal')">Cancel</button>
            </div>
        </div>
    </div>

<script>
    let state = JSON.parse(localStorage.getItem('budget_pro_data')) || { salary: 0, expenses: [] };
    let historyData = JSON.parse(localStorage.getItem('budget_pro_history')) || [];
    let activeEditId = null;

    function capitalizeFirst(el) {
        el.value = el.value.charAt(0).toUpperCase() + el.value.slice(1);
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function showAlert(title, msg) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('alertModal').style.display = 'flex';
    }

    function showConfirmModal() {
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function saveAndRefresh() {
        state.salary = parseFloat(document.getElementById('salaryInput').value) || 0;
        localStorage.setItem('budget_pro_data', JSON.stringify(state));
        render();
    }

    function addExpense() {
        const nameNode = document.getElementById('expName');
        const amountNode = document.getElementById('expAmount');
        const unwantedNode = document.getElementById('unwantedCheck');
        const amount = parseFloat(amountNode.value);

        if (isNaN(amount) || amount <= 0) {
            return showAlert("Invalid Amount", "Please enter a valid expense amount to continue.");
        }

        const now = new Date();
        state.expenses.unshift({ 
            id: Date.now(), 
            name: nameNode.value.trim() || "Misc Expense", 
            amount: amount, 
            unwanted: unwantedNode.checked,
            fullDate: `${now.toLocaleDateString('en-GB')} ${now.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit', hour12: true}).toLowerCase()}`
        });

        nameNode.value = ''; amountNode.value = ''; unwantedNode.checked = false;
        saveAndRefresh();
    }

    function render() {
        const totalExp = state.expenses.reduce((s, e) => s + e.amount, 0);
        const rem = state.salary - totalExp;
        const progress = state.salary > 0 ? Math.min((totalExp / state.salary) * 100, 100) : 0;

        document.getElementById('displayBalance').innerHTML = `💰 ₹${rem.toLocaleString()}`;
        document.getElementById('statIncome').innerText = `Income: ₹${state.salary.toLocaleString()}`;
        document.getElementById('statExpense').innerText = `Expense: ₹${totalExp.toLocaleString()}`;
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('balanceCard').classList.toggle('over-budget', rem < 0);
        document.getElementById('salaryInput').value = state.salary || '';

        document.getElementById('listCard').style.display = state.expenses.length > 0 ? 'block' : 'none';

        const nameCounts = state.expenses.reduce((acc, curr) => {
            const name = curr.name.toLowerCase().trim();
            acc[name] = (acc[name] || 0) + 1;
            return acc;
        }, {});

        const list = document.getElementById('expenseList');
        list.innerHTML = '';
        state.expenses.forEach(e => {
            const isFrequent = nameCounts[e.name.toLowerCase().trim()] > 1;
            const isEditing = activeEditId === e.id;
            let li = document.createElement('li');
            li.className = e.unwanted ? 'unwanted-row' : '';

            if (isEditing) {
                li.innerHTML = `
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="edit-name-${e.id}" value="${e.name}" style="flex:2; padding:8px; font-size:14px;">
                        <input type="number" id="edit-amt-${e.id}" value="${e.amount}" style="flex:1; padding:8px; font-size:14px;">
                        <button onclick="saveInlineEdit(${e.id})" style="width:40px; padding:0;">💾</button>
                    </div>`;
            } else {
                li.innerHTML = `
                    <div class="li-content">
                        <div style="flex:1">
                            <strong style="font-size:14px;">${e.name}${isFrequent ? '<span class="frequent-tag">FREQ</span>' : ''}</strong>
                            <div style="font-size:10px; color:var(--text-muted)">${e.fullDate}</div>
                        </div>
                        <div class="item-actions">
                            <span style="font-weight:800; font-size:14px;">₹${e.amount.toLocaleString()}</span>
                            <span class="edit-btn" onclick="toggleInlineEdit(${e.id})">✏️</span>
                            <span class="delete-btn" onclick="deleteExpense(${e.id})">🗑️</span>
                        </div>
                    </div>`;
            }
            list.appendChild(li);
        });
        renderHistory();
    }

    function toggleInlineEdit(id) {
        activeEditId = (activeEditId === id) ? null : id;
        render();
    }

    function saveInlineEdit(id) {
        const name = document.getElementById(`edit-name-${id}`).value;
        const amt = parseFloat(document.getElementById(`edit-amt-${id}`).value);
        if (isNaN(amt) || amt <= 0) return showAlert("Error", "Invalid amount");
        const index = state.expenses.findIndex(e => e.id === id);
        if (index !== -1) {
            state.expenses[index].name = name;
            state.expenses[index].amount = amt;
            activeEditId = null;
            saveAndRefresh();
        }
    }

    function deleteExpense(id) {
        state.expenses = state.expenses.filter(x => x.id !== id);
        activeEditId = null;
        saveAndRefresh();
    }

    function executeClear() {
        state.expenses = [];
        closeModal('confirmModal');
        saveAndRefresh();
    }

    function checkDuplicateHistory() {
        if (state.expenses.length === 0) return showAlert("Empty List", "There is no data to save in history.");
        const currentMonth = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        const existingIndex = historyData.findIndex(h => h.month === currentMonth);
        if (existingIndex !== -1) {
            document.getElementById('duplicateModal').style.display = 'flex';
        } else {
            saveHistory('new');
        }
    }

    function handleHistoryAction(action) {
        saveHistory(action);
        closeModal('duplicateModal');
    }

    function saveHistory(type) {
        const monthYear = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        const existingIndex = historyData.findIndex(h => h.month === monthYear);

        if (type === 'overwrite' && existingIndex !== -1) {
            historyData.splice(existingIndex, 1);
        }

        if (type === 'merge' && existingIndex !== -1) {
            historyData[existingIndex].details = [...state.expenses, ...historyData[existingIndex].details];
            historyData[existingIndex].totalSpent = historyData[existingIndex].details.reduce((s, e) => s + e.amount, 0);
        } else {
            historyData.unshift({ 
                id: Date.now(), 
                month: monthYear, 
                totalSpent: state.expenses.reduce((s, e) => s + e.amount, 0), 
                details: [...state.expenses] 
            });
        }

        state.expenses = [];
        localStorage.setItem('budget_pro_data', JSON.stringify(state));
        localStorage.setItem('budget_pro_history', JSON.stringify(historyData));
        showAlert("Success", "History saved! Current list has been cleared.");
        render();
    }

    function renderHistory() {
        const hList = document.getElementById('historyList');
        hList.innerHTML = '';
        historyData.forEach(h => {
            const itemsHtml = h.details.map(d => `
                <div class="hist-item">
                    <span><strong>${d.name}</strong><br><small style="color:var(--text-muted)">${d.fullDate}</small></span>
                    <span style="font-weight:700">₹${d.amount.toLocaleString()}</span>
                </div>
            `).join('');

            hList.innerHTML += `
                <details class="history-card">
                    <summary>
                        <span>🗓️ ${h.month}</span>
                        <span style="color:var(--primary-blue)">₹${h.totalSpent.toLocaleString()} ▾</span>
                    </summary>
                    <div style="background:var(--bg-body)">${itemsHtml}</div>
                </details>`;
        });
    }

    render();
</script>
</body>
</html>
